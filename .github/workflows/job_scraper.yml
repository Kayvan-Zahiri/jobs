name: Job Scraper — Daily Alerts

on:
  # Run 4 times a day: midnight, 6am, noon, 6pm UTC
  schedule:
    - cron: "0 0 * * *"    # 00:00 UTC
    - cron: "0 6 * * *"    # 06:00 UTC
    - cron: "0 12 * * *"   # 12:00 UTC
    - cron: "0 18 * * *"   # 18:00 UTC

  # Allow manual triggering from the Actions tab
  workflow_dispatch:

jobs:
  scrape-and-notify:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout repo ─────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Restore cached seen_jobs.json ─────────────────────────
      - name: Restore seen jobs cache
        uses: actions/cache/restore@v4
        with:
          path: scraper/seen_jobs.json
          key: seen-jobs-store

      # ── 3. Set up Python ─────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # ── 4. Run the scraper ───────────────────────────────────────
      - name: Run job scraper
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
        run: python scraper/job_scraper.py

      # ── 5. Save seen_jobs.json to cache ──────────────────────────
      - name: Delete old cache
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh cache delete seen-jobs-store || true

      - name: Save seen jobs cache
        uses: actions/cache/save@v4
        with:
          path: scraper/seen_jobs.json
          key: seen-jobs-store
